id: cloud-storage
name: Cloud Storage (R2-as-Drive)
version: 0.1.0
kind: capability
status: planned
riskLevel: sensitive-data
description: >
  Google-Drive-style UI over Cloudflare R2: file browser, upload/download, share links, folder structure (R2 has flat keys; we layer folder semantics on top), scheduled sync from local folders / S3 / Google Drive. Includes cron-driven backup workflows.
runtime:
  frontend:
    framework: react
    surfaces: ["FileBrowser", "UploadDropzone", "ShareLinkPanel", "SyncJobsTable", "StorageQuotaCard", "TrashBin"]
  backend:
    platform: node
    packages: [zod]
requires:
  env: ["R2_ACCOUNT_ID", "R2_DEFAULT_BUCKET", "CLOUD_STORAGE_TRASH_RETENTION_DAYS"]
  capabilities: ["connector-config", "scheduler", "notify", "bulk-media-import"]
provides:
  ui: ["FileBrowser", "UploadDropzone", "ShareLinkPanel", "SyncJobsTable", "StorageQuotaCard", "TrashBin"]
  api:
    - GET /api/cloud/buckets/:bucket
    - POST /api/cloud/buckets/:bucket/upload
    - GET /api/cloud/buckets/:bucket/objects/:key
    - POST /api/cloud/share
    - DELETE /api/cloud/buckets/:bucket/objects/:key
    - POST /api/cloud/sync/schedule
    - GET /api/cloud/sync/jobs
    - POST /api/cloud/restore-from-trash
  events:
    - cloud.object.uploaded
    - cloud.object.deleted
    - cloud.object.restored
    - cloud.share-link.created
    - cloud.sync.run.completed
    - cloud.quota.warning
  jobs:
    - cloud-storage:upload
    - cloud-storage:scheduled-sync
    - cloud-storage:quota-rollup
    - cloud-storage:expire-shares
security:
  secrets: ["R2_ACCESS_KEY_ID", "R2_SECRET_ACCESS_KEY", "GOOGLE_DRIVE_OAUTH"]
  privilegedActions: ["r2-object-write", "r2-object-delete", "external-share-link-create"]
diagnostics:
  runbook: docs/diagnostics.runbook.md
  healthChecks:
    - name: capability-up
      probe: "GET /api/health"
      expect: "200"

id: windows-control
name: Windows Control
version: 0.1.0
kind: capability
status: planned
riskLevel: privileged
description: >
  UIA semantic clicking + OCR + template match + window mgmt via the BBWADMIN broker pattern (port 9900 + bearer tokens with scope-graded permissions).
runtime:
  frontend:
    framework: react
    surfaces: ["WindowList", "UiaTreeViewer", "OcrTargetPicker", "TemplateMatchPanel", "ActionScopeBadge"]
  backend:
    platform: node
    packages: [zod]
requires:
  env: ["WCTL_BROKER_URL", "WCTL_DEFAULT_SCOPE"]
  capabilities: ["fleet-control"]
provides:
  ui: ["WindowList", "UiaTreeViewer", "OcrTargetPicker", "TemplateMatchPanel", "ActionScopeBadge"]
  api:
    - POST /api/wctl/screenshot
    - POST /api/wctl/click
    - POST /api/wctl/uia-click
    - POST /api/wctl/type
    - POST /api/wctl/ocr
    - POST /api/wctl/template-match
    - POST /api/wctl/window
  events:
    - wctl.action.completed
    - wctl.action.denied
    - wctl.uia.click.miss
    - wctl.ocr.completed
  jobs:
    - windows-control:dispatch
    - windows-control:capture-uia-tree
security:
  secrets: ["BBWADMIN_BROKER_TOKEN", "BBWADMIN_BROKER_ADMIN_TOKEN"]
  privilegedActions: ["remote-gui", "registry-write", "service-restart", "filesystem-write"]
diagnostics:
  runbook: docs/diagnostics.runbook.md
  healthChecks:
    - name: capability-up
      probe: "GET /api/windows/health"
      expect: "200"
